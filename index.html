<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium GitHub Profile README Generator</title>
    <script>
      // Sandboxed iframe environment fallback for writable window.fetch
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            let currentFetch = originalFetch;
            Object.defineProperty(window, 'fetch', {
              get: function() { return currentFetch; },
              set: function(value) { currentFetch = value; },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn("Polyfill helper: could not patch window.fetch setter compatibility", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
